<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>穿深计算器</title>
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
            }

            .card {
                background: #ffffff;
                padding: 30px;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
                width: 100%;
                max-width: 450px;
                text-align: center;
            }

            h1 {
                font-size: 14px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 5px;
            }

            h2 {
                font-size: 22px;
                color: #2c3e50;
                margin-top: 0;
                margin-bottom: 25px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                margin-bottom: 20px;
            }

            .input-group {
                text-align: left;
            }

            .input-group.full-width {
                grid-column: 1 / -1;
            }

            label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #555;
                margin-bottom: 5px;
            }

            input,
            select {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 15px;
                box-sizing: border-box;
                background-color: #f9f9f9;
            }

            input:focus,
            select:focus {
                outline: none;
                border-color: #3498db;
                background-color: #fff;
                box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
            }

            .btn-calc {
                background: linear-gradient(135deg, #3498db, #2980b9);
                color: white;
                border: none;
                padding: 14px 20px;
                font-size: 18px;
                font-weight: bold;
                border-radius: 8px;
                cursor: pointer;
                width: 100%;
                transition: all 0.3s ease;
            }

            .btn-calc:hover {
                background: linear-gradient(135deg, #2980b9, #2c3e50);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }

            .btn-calc:disabled {
                background: #95a5a6;
                cursor: not-allowed;
            }

            .result-box {
                margin-top: 25px;
                padding: 20px;
                background-color: #fff3cd;
                border: 1px solid #ffeeba;
                border-radius: 8px;
                font-size: 18px;
                font-weight: bold;
                color: #856404;
                display: none;
                animation: fadeIn 0.5s;
            }

            .result-value {
                color: #d35400;
                font-size: 24px;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>

    <body>

        <div class="card">
            <h1>Firefight</h1>
            <h2>🛡️ 穿甲深度计算器</h2>

            <div class="form-grid">
                <div class="input-group full-width">
                    <label for="ammoType">弹种</label>
                    <select id="ammoType">
                        <option value="AP">AP</option>
                        <option value="APC">APC</option>
                        <option value="APCBC">APCBC</option>
                        <option value="APCR">APCR</option>
                        <option value="APCNR">APCNR</option>
                        <option value="APDS">APDS</option>
                        <option value="APFSDS">APFSDS</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="caliber">口径 (mm)</label>
                    <input type="number" id="caliber" value="120" step="1">
                </div>

                <div class="input-group">
                    <label for="mass">质量 (kg)</label>
                    <input type="number" id="mass" value="8" step="0.1">
                </div>

                <div class="input-group">
                    <label for="speed">速度 (m/s)</label>
                    <input type="number" id="speed" value="1700" step="10">
                </div>

                <div class="input-group">
                    <label for="distance">飞行距离 (m)</label>
                    <input type="number" id="distance" value="1000" step="100">
                </div>

                <div class="input-group full-width">
                    <label for="angle">入射角角度 (0-89度)</label>
                    <input type="number" id="angle" value="0" step="5" min="0" max="89">
                </div>
            </div>

            <button class="btn-calc" id="calcBtn">⚡ 开始计算</button>

            <div class="result-box" id="resultArea">
                🎯 穿深为 <span class="result-value" id="result">0</span> mm
            </div>
        </div>

        <script>
            document.getElementById('calcBtn').addEventListener('click', function () {
                const btn = this;
                const resultArea = document.getElementById('resultArea');
                const resultSpan = document.getElementById('result');

                btn.disabled = true;
                btn.textContent = '计算中...';
                resultArea.style.display = 'none';

                // 模拟后端计算延迟 (呼应您最初的问题)
                setTimeout(() => {
                    try {
                        // 1. 获取输入值
                        const ammoType = document.getElementById('ammoType').value;
                        const C = parseFloat(document.getElementById('caliber').value);
                        const mass = parseFloat(document.getElementById('mass').value);
                        const speed = parseFloat(document.getElementById('speed').value);
                        const distance = parseFloat(document.getElementById('distance').value);
                        const angle = parseFloat(document.getElementById('angle').value);

                        // 2. 判断风阻 (复刻 Python 逻辑，去除了原代码中多余的末尾空格)
                        let wind_resistance = 0;
                        if (ammoType === "AP" || ammoType === "APC") { wind_resistance = 22.0; }
                        else if (ammoType === "APCBC") { wind_resistance = 11.0; }
                        else if (ammoType === "APCNR" || ammoType === "APCR") { wind_resistance = 14.0; }
                        else if (ammoType === "APDS") { wind_resistance = 7.0; }
                        else if (ammoType === "APFSDS") { wind_resistance = 5.0; }
                        else { throw new Error("弹种错误"); }

                        // 防护：入射角不能 >= 90度，否则 cos 为 0 会导致除以 0 (Infinity)
                        if (angle >= 90) { throw new Error("入射角必须小于90度"); }

                        // 3. 核心公式计算 (严格遵照您的 Python 代码)
                        const angle_sec = 1 / Math.cos(angle * (Math.PI / 180));

                        // 原代码: a = math.pow(2.7183,((wind_resistance / -100000.0) * distance))
                        const a = Math.pow(2.7183, ((wind_resistance / -100000.0) * distance));

                        // 原代码: actually_speed=math.pow(speed*a,1.5)
                        const actually_speed = Math.pow(speed * a, 1.5);

                        // 原代码: P= C * math.pow(mass,0.046321) * actually_speed * 0.000051069 * 1.155 * 1.1 
                        // (注: 修复了原代码 0.0 00051069 中间的空格笔误)
                        const P = C * Math.pow(mass, 0.046321) * actually_speed * 0.000051069 * 1.155 * 1.1;

                        const actual_P = P / angle_sec;

                        // 4. 四舍五入逻辑 (复刻原代码的 Float 判断，JS中直接用 Math.round 效果一致)
                        const finalResult = Math.round(actual_P);

                        // 5. 渲染结果
                        resultSpan.textContent = finalResult;
                        resultArea.style.display = 'block';

                    } catch (error) {
                        alert("计算出错: " + error.message);
                    } finally {
                        btn.disabled = false;
                        btn.textContent = '⚡ 开始计算';
                    }
                }, 300); // 300ms 模拟计算延迟
            });
        </script>
    </body>

</html>
